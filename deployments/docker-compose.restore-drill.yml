services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orag
      POSTGRES_PASSWORD: orag
      POSTGRES_DB: orag
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orag -d orag"]
      interval: 5s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.11.5
    ports:
      - "${QDRANT_HTTP_HOST_PORT}:6333"
      - "${QDRANT_GRPC_HOST_PORT}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': </dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
  qdrant_data:
