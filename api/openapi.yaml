          type: array
          items:
            type: integer
        rrf_k:
          type: array
          items:
            type: integer
        semantic_cache_thresholds:
          type: array
          items:
            type: number
            format: double
    HarnessCandidate:
      type: object
      description: External harness config. Use argv array only; shell command strings and `${VAR}` interpolation are rejected.
      properties:
        kind:
          type: string
        argv:
          type: array
          items:
            type: string
        command:
          type: string
          deprecated: true
    CandidateResult:
      type: object
      required: [profile, top_k, score, pairwise_accuracy, run_id]
      description: |
        Deprecated optimization candidate summary. `score` is the objective
        ranking score. Rule-only fallback uses `deterministic_answer_match`;
        `pairwise_accuracy` is retained for legacy clients and real pairwise
        judge output.
      properties:
        profile:
          $ref: "#/components/schemas/Profile"
        top_k:
          type: integer
        score:
          type: number
          format: double
          description: Objective ranking score for this candidate.
        score_metric:
          type: string
          description: Metric that supplied `score`, for example deterministic_answer_match or pairwise_accuracy.
        deterministic_answer_match:
          type: number
          format: double
          description: Deterministic rule-based answer match fallback metric.
        pairwise_accuracy:
          type: number
          format: double
          description: Real pairwise judge win-rate/accuracy metric or historical compatibility field.
          deprecated: true
        ndcg_at_k:
          type: number
          format: double
        recall_at_k:
          type: number
          format: double
        mrr:
          type: number
          format: double
        map:
          type: number
          format: double
        retrieval_failure_rate:
          type: number
          format: double
        redundancy_rate:
          type: number
          format: double
        duplicate_count:
          type: number
          format: double
        deduped_top_k_count:
          type: number
          format: double
        alpha_ndcg:
          type: number
          format: double
        aspect_coverage:
          type: number
          format: double
        latency_p95_ms:
          type: number
          format: double
        run_id:
          type: string
