        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: ORAG user token or orag_sk_ API key
  responses:
    Error:
      description: |
        Unified error response. The `trace_id` is always present, is echoed from
        the incoming `X-Trace-ID` header when supplied, and is also returned in
        the `X-Trace-ID` response header for log and persisted trace correlation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
    TraceID:
      name: trace_id
      in: path
      required: true
      schema:
        type: string
  schemas:
    BuildInfo:
      type: object
      required: [version, commit, build_time]
      properties:
        version:
          type: string
          example: v0.1.0-beta.1
        commit:
          type: string
          example: 0123456789abcdef
        build_time:
          type: string
          example: 2026-07-14T00:00:00Z
    Profile:
      type: string
      enum: [realtime, high_precision]
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/ErrorBody"
    ErrorBody:
      type: object
      required: [code, message, trace_id]
      properties:
        code:
          type: string
        message:
          type: string
        trace_id:
          type: string
          description: Request trace identifier used for logs and trace lookup.
        details:
          type: object
          additionalProperties: true
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    LoginResponse:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
    APIKeyRole:
      type: string
      enum: [tenant_admin, project_editor, project_viewer]
    CreateAPIKeyRequest:
      type: object
      required: [name, role]
      properties:
        name:
          type: string
        role:
          $ref: "#/components/schemas/APIKeyRole"
        project_id:
          type: string
          description: Required for project_editor and project_viewer. Optional project constraint for tenant_admin.
        expires_at:
          type: string
          format: date-time
          description: Optional future expiry instant.
    APIKey:
      type: object
