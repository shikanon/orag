name: Documentation issue
description: Report missing, incorrect, stale, or unclear documentation.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: input
    id: location
    attributes:
      label: Documentation location
      description: Provide the repository path or published page URL.
      placeholder: docs/getting-started/README.md
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Quote only the minimum necessary text and explain what is wrong or missing.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected documentation
      description: Describe the correct behavior, command, contract, or example.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Relevant version or commit
      placeholder: main or v0.1.0-beta.1
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I checked the current router and OpenAPI contract when this concerns API behavior.
          required: true
        - label: I searched for an existing documentation issue.
          required: true
    validations:
      required: true
