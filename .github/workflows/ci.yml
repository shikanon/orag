name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
      GOFLAGS: -tags=stdjson,gjson
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
      - run: go mod download
      - run: gofmt -w $(find . -name '*.go' -not -path './vendor/*') && git diff --exit-code
      - run: make agent-sync-check
      - run: make agent-artifact-tests
      - run: make mcp-self-check-smoke
      - run: make sdk-check
      - run: go test ./...
      - run: go vet ./...
      - run: go test ./tests/contract -run TestOpenAPI -v
      - run: make performance-baseline-evidence-verify PERFORMANCE_BASELINE_EVIDENCE=docs-site/benchmarks/2026-07-17-darwin-arm64-main-75eda8f
      - run: docker build -f deployments/Dockerfile -t orag-api:ci .
      - run: docker build -f deployments/console.Dockerfile --target console -t orag-console:ci .
      - run: docker compose -f deployments/docker-compose.yml --profile demo config >/dev/null
