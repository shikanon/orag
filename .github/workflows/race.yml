name: race

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-race:
    name: Go race detector
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CGO_ENABLED: "1"
      GOFLAGS: -tags=stdjson,gjson
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
      - run: go mod download
      - name: Run race detector across Go packages
        run: go test -race ./...
