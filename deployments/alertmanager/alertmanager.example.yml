route:
  receiver: orag-webhook
  group_by:
    - alertname
    - service
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - alertname
      - service

receivers:
  - name: orag-webhook
    webhook_configs:
      - url: http://orag-api:8080/v1/ops/alerts
        send_resolved: true
