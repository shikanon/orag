server:
  host: 0.0.0.0
  port: 8080
  public_base_url: http://localhost:8080
  debug: false

storage:
  backend: qdrant_postgres

database:
  url: postgres://orag:orag@localhost:5432/orag?sslmode=disable

qdrant:
  host: localhost
  grpc_port: 6334
  use_tls: false
  collection: orag_chunks
  semantic_cache_collection: orag_semantic_cache
  auto_create_collections: true

ark:
  # Runtime defaults recommend VolcEngine / Ark / Doubao.
  # Set ARK_API_KEY or VOLCENGINE_API_KEY before starting the service.
  base_url: https://ark.cn-beijing.volces.com/api/v3
  chat_model: doubao-seed-2-1-pro-260628
  embedding_model: doubao-embedding-vision-251215
  embedding_dimensions: 1024
  rerank_provider: volcengine
  rerank_base_url: https://ark.cn-beijing.volces.com/api/v3
  rerank_model: m3-v2-rerank
  aliyun_rerank_base_url: https://dashscope.aliyuncs.com/compatible-api/v1
  aliyun_rerank_model: qwen3-rerank
  multimodal_model: doubao-seed-2-1-pro-260628
  timeout: 60s
  retry_times: 2

models:
  chat_provider: volcengine
  embedding_provider: volcengine
  rerank_provider: volcengine
  multimodal_provider: volcengine
  allow_deterministic_mock: false
  supported_providers:
    - openai
    - azure-openai
    - anthropic
    - gemini
    - google-cloud
    - xai
    - mistral
    - cohere
    - deepseek
    - moonshot
    - minimax
    - baichuan
    - zhipu-ai
    - tongyi-qianwen
    - volcengine
    - tencent-hunyuan
    - xunfei-spark
    - baiduyiyan
    - xiaomi
    - perplexity
    - voyage-ai
    - jina
  # Providers with no global endpoint require an explicit base URL through env:
  # AZURE_OPENAI_BASE_URL=https://your-resource.openai.azure.com
  # GOOGLE_CLOUD_BASE_URL=https://your-google-cloud-model-endpoint
  provider_base_url_overrides:
    azure-openai: ""
    google-cloud: ""

rag:
  default_profile: realtime
  dense_top_k: 50
  sparse_top_k: 50
  rrf_k: 60
  rerank_top_n: 8
  context_top_n: 8
  max_context_tokens: 6000
  semantic_cache_threshold: 0.92
  semantic_cache_max_entries: 10000
  query_rewrite_enabled: true
  multi_query_count: 3
  hyde_enabled: true
  query_router:
    enabled: false
    strategy: heuristic
    direct_max_runes: 16
    complex_min_signals: 2
  graph_retrieval:
    enabled: false
    top_k: 8
    max_entities_per_chunk: 6
  no_context_answer: 未在知识库中检索到足够依据，无法基于上下文回答。
  prompt_cache_mode: auto
  require_external_providers: true

ingestion:
  chunk_size_tokens: 800
  chunk_overlap_tokens: 120
  max_document_bytes: 26214400
  parser_method: basic
  contextual_retrieval:
    enabled: false
    max_document_chars: 12000
    max_chunk_chars: 2000
    max_context_chars: 500
    failure_mode: fallback
  raptor:
    enabled: false
    branch_factor: 4
    max_levels: 2
    max_summary_chars: 1000
  mineru:
    api_url: ""
    server_url: ""
    backend: pipeline
    parse_method: auto
    lang: English
    formula_enable: true
    table_enable: true
  docling:
    server_url: ""
    timeout: 10m

object_storage:
  provider: local
  mock_upload: true

tutorial:
  # Public read-only package catalog; cloned user data uses user-provided private storage.
  catalog_base_url: https://orag.oss-cn-guangzhou.aliyuncs.com/tutorial-packs

observability:
  record_prompts: false
  tracing:
    store_query: true
    query_max_bytes: 2048
    retention_days: 30

maintenance:
  offline_knowledge_organizer:
    enabled: false
    schedule: "0 2 * * *"
    # Equivalent env: OFFLINE_KNOWLEDGE_ORGANIZER_TARGETS=tenant_default:kb_default,tenant_acme:kb_docs
    targets:
      - tenant_id: tenant_default
        kb_id: kb_default
      - tenant_id: tenant_acme
        kb_id: kb_docs
    lookback_days: 7
    max_questions_per_run: 500
    max_clusters_per_run: 200
    max_codex_concurrency: 4
    max_codex_deep_search_steps: 12
    max_codex_tokens_per_question: 20000
    max_tool_qps_per_tenant: 20
    max_tool_rows_per_call: 50
    max_replay_concurrency: 8
    max_eval_concurrency: 4
    min_question_occurrence: 2
    long_tail_sampling_rate: 0.05
    explicit_negative_feedback_boost: 10
    min_verify_confidence: 0.8
    min_publish_confidence: 0.9
    evidence_validation_enabled: true
    conclusion_judge_enabled: true
    shadow_retrieval_enabled: true
    shadow_inject_enabled: false
    shadow_event_ttl_days: 14
    shadow_event_sampling_rate: 1.0
    auto_publish_enabled: false
    regression_eval_enabled: true
    # Regression datasets should use dataset item split/weight metadata.
    # `eval` drives baseline/candidate comparison; `holdout` is used by holdout gates.
    # Candidate retrieval is scoped to the current optimization item at runtime.
    regression_dataset_id: ds_offline_regression
    full_regression_for_rewrite_enabled: true
    min_recall_lift: 0.05
    min_answer_quality_lift: 0.03
    max_latency_delta_ms: 300
