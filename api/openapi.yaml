            map: 0.5
            retrieval_failure_rate: 0.5
            redundancy_rate: 0.2
            duplicate_count: 1
            deduped_top_k_count: 4
            alpha_ndcg: 0.5
            aspect_coverage: 0.5
            latency_p95_ms: 30
            run_id: eval_realtime
          - profile: high_precision
