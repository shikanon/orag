            score: 1
            pairwise_accuracy: 1
            ndcg_at_k: 1
            recall_at_k: 1
            mrr: 1
            map: 1
            retrieval_failure_rate: 0
            redundancy_rate: 0
            duplicate_count: 0
            deduped_top_k_count: 8
            alpha_ndcg: 1
            aspect_coverage: 1
            latency_p95_ms: 42
            run_id: eval_best
      properties:
        id:
          type: string
        status:
          type: string
        best:
          $ref: "#/components/schemas/CandidateResult"
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/CandidateResult"
    OptimizationAcceptedResponse:
      type: object
      required: [run_id, status, poll_url, cancel_url, resume_url]
      properties:
        run_id:
          type: string
        status:
          type: string
          enum: [queued, running, completed, canceling, canceled, budget_stopped, failed]
        poll_url:
          type: string
          example: /v1/optimizations/opt_xxx
        cancel_url:
          type: string
          example: /v1/optimizations/opt_xxx:cancel
        resume_url:
          type: string
          example: /v1/optimizations/opt_xxx:resume
    OptimizationCancelRequest:
      type: object
      properties:
        reason:
          type: string
    OptimizationStatusResponse:
      type: object
      required: [run, candidates]
      properties:
        run:
          $ref: "#/components/schemas/OptimizationRun"
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/OptimizationCandidate"
    OptimizationRun:
      type: object
      required: [id, dataset_id, knowledge_base_id, objective, search_space, status, sampling_strategy, search_space_size, sampled_candidate_count, completed_candidate_count, checkpoint, created_at, updated_at]
      properties:
        id:
          type: string
        dataset_id:
          type: string
        knowledge_base_id:
          type: string
        objective:
          $ref: "#/components/schemas/ObjectiveSpec"
        search_space:
          $ref: "#/components/schemas/SearchSpace"
        runner:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [queued, running, completed, canceling, canceled, budget_stopped, failed]
        status_reason:
          type: string
        best_candidate_id:
          type: string
        holdout_candidate_id:
          type: string
        sampling_strategy:
          type: string
        search_space_size:
          type: integer
          format: int64
        sampled_candidate_count:
          type: integer
        completed_candidate_count:
          type: integer
        checkpoint:
          type: object
          additionalProperties: true
        cost_usd:
          type: number
          format: double
        cost_budget_usd:
          type: number
          format: double
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    OptimizationCandidate:
      type: object
      required: [id, optimization_run_id, config, status, created_at, updated_at]
      properties:
        id:
          type: string
        optimization_run_id:
          type: string
        config:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [queued, running, evaluated, judged, scored, promoted, holdout_evaluated, cleanup_done, failed]
        evaluation_run_id:
          type: string
        judge_run_id:
          type: string
        objective_score:
          type: number
          format: double
        holdout_score:
          type: number
          format: double
        confidence:
          type: object
          additionalProperties:
            type: number
            format: double
        metrics:
          $ref: "#/components/schemas/EvaluationMetrics"
        token_usage:
          type: object
          additionalProperties: true
        cost_usd:
          type: number
          format: double
        artifacts:
          type: object
          additionalProperties: true
        temp_namespaces:
          type: array
