openapi: 3.0.3
info:
  title: ORAG API
  version: 0.1.0-beta.1
  description: Go RAG framework API backed by Hertz, Eino Graph, Ark/Doubao, Qdrant, and PostgreSQL.
servers:
  - url: http://localhost:8080
tags:
  - name: System
  - name: Auth
  - name: APIKeys
  - name: Projects
  - name: Tutorials
  - name: KnowledgeBases
  - name: Ingestion
  - name: Query
  - name: Trace
  - name: Evaluation
  - name: OfflineKnowledge
x-orag-agent-capabilities:
  version: 1
  source: openapi
  generation_boundary:
    mcp_tool_schema: true
    skill_manifests: true
    runtime_handlers: false
    note: Ralph Loop is a planned-only agent capability in this manifest; MCP/Skill artifacts can be generated from it, but the ORAG HTTP router intentionally does not register POST /v1/ralph-loop until a real runtime handler is implemented.
  capabilities:
    - id: ralph-loop
      name: Ralph Loop
      description: Run or resume a bounded Ralph Loop verification workflow for an ORAG task/spec and return the verdict, artifacts, and trace identifier.
      status: planned
      maturity: experimental
      source:
        kind: planned_http
        method: POST
        path: /v1/ralph-loop
        operation_id: runRalphLoop
        backing_services:
          - optimization service
          - evaluation service
          - trace service
      auth:
        required: true
        scheme: bearerAuth
        env:
          - ORAG_API_BASE_URL
          - ORAG_API_TOKEN
          - ORAG_TENANT_ID
      trace:
        request_header: X-Trace-ID
        response_header: X-Trace-ID
        response_field: trace_id
      schemas:
        input: "#/components/schemas/RalphLoopRequest"
        output: "#/components/schemas/RalphLoopResponse"
        error: "#/components/schemas/ErrorResponse"
      mcp:
        tool_name: ralph_loop_run
        description: Execute a Ralph Loop task verification workflow through the ORAG API contract.
        input_schema: "#/components/schemas/RalphLoopRequest"
        output_schema: "#/components/schemas/RalphLoopResponse"
      skills:
        manifest_name: ralph-loop
        description: Use when an agent needs to run bounded ORAG Ralph Loop verification from a spec/task path and report a PASS/FAIL verdict with trace evidence.
      examples:
        - name: verify-task1
          input:
            task_spec_path: .trae/specs/add-ralph-loop-mcp-skills/tasks.md
            task_id: Task 1
            mode: focused
            max_rounds: 1
          expected_output:
            status: completed
            verdict: pass
            trace_id: trace_ralph_loop_example
paths:
  /healthz:
    get:
      tags: [System]
      operationId: healthz
      x-orag-maturity: experimental
      responses:
        "200":
          description: Process is alive.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok
  /readyz:
    get:
      tags: [System]
      operationId: readyz
      x-orag-maturity: experimental
      responses:
        "200":
          description: Service dependencies are ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: One or more dependencies are not ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
  /metrics:
    get:
      tags: [System]
      operationId: metrics
      x-orag-maturity: experimental
      responses:
        "200":
          description: Prometheus text metrics.
          content:
            text/plain:
              schema:
                type: string
  /version:
    get:
      tags: [System]
      operationId: version
      x-orag-maturity: beta
      responses:
        "200":
          description: Immutable build and release identity.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildInfo"
  /docs:
    get:
      tags: [System]
      operationId: docs
      x-orag-maturity: beta
      responses:
        "200":
          description: Interactive API documentation powered by the canonical OpenAPI specification.
          content:
            text/html:
              schema:
                type: string
  /openapi.yaml:
    get:
      tags: [System]
      operationId: getOpenAPISpec
      x-orag-maturity: beta
      responses:
        "200":
          description: Canonical OpenAPI 3 specification.
          content:
            application/yaml:
              schema:
                type: string
  /v1/auth/login:
    post:
      tags: [Auth]
      operationId: login
      x-orag-maturity: experimental
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/knowledge-bases:
    get:
      tags: [KnowledgeBases]
      operationId: listKnowledgeBases
      x-orag-maturity: experimental
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Knowledge base list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeBaseListResponse"
        "401":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
    post:
      tags: [KnowledgeBases]
      operationId: createKnowledgeBase
      x-orag-maturity: experimental
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKnowledgeBaseRequest"
      responses:
        "201":
          description: Created knowledge base.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeBase"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/knowledge-bases/{id}:
    get:
      tags: [KnowledgeBases]
      operationId: getKnowledgeBase
      x-orag-maturity: experimental
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Knowledge base.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeBase"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
    delete:
      tags: [KnowledgeBases]
      operationId: deleteKnowledgeBase
      x-orag-maturity: experimental
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          description: Tenant-scoped knowledge base deleted; directly owned documents, chunks, ingestion jobs, vector points, and semantic-cache entries are removed.
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/knowledge-bases/{id}/documents:
    post:
      tags: [Ingestion]
      operationId: uploadDocument
      x-orag-maturity: experimental
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "202":
          description: Document ingestion accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "413":
          $ref: "#/components/responses/Error"
  /v1/knowledge-bases/{id}/uploads:
    post:
      tags: [Ingestion]
      operationId: createUploadSession
      x-orag-maturity: experimental
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUploadRequest"
      responses:
        "201":
          description: Resumable upload session created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadSession"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "413":
          $ref: "#/components/responses/Error"
  /v1/uploads/{id}:
    get:
      tags: [Ingestion]
      operationId: getUploadSession
      x-orag-maturity: experimental
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Current resumable upload session state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadSession"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    put:
      tags: [Ingestion]
      operationId: appendUploadChunk
      x-orag-maturity: experimental
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
        - in: header
          name: Upload-Offset
          required: true
          schema:
            type: integer
            minimum: 0
          description: Zero-based byte offset where this chunk must be appended.
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Chunk accepted and session offset advanced.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadSession"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "413":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Ingestion]
      operationId: cancelUploadSession
      x-orag-maturity: experimental
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          description: Upload session canceled and temporary content removed.
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  "/v1/uploads/{id}:complete":
    post:
      tags: [Ingestion]
      operationId: completeUploadSession
      x-orag-maturity: experimental
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "202":
          description: Upload completed and document ingestion accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteUploadResponse"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  "/v1/knowledge-bases/{id}/documents:import":
    post:
      tags: [Ingestion]
      operationId: importDocument
      x-orag-maturity: experimental
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportDocumentRequest"
      responses:
        "202":
          description: Document ingestion accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "413":
          $ref: "#/components/responses/Error"
  /v1/ingestion-jobs/{id}:
    get:
      tags: [Ingestion]
      operationId: getIngestionJob
      x-orag-maturity: experimental
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Ingestion job.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionJob"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/query:
    post:
      tags: [Query]
      operationId: query
      x-orag-maturity: experimental
      description: |
        Executes a RAG query. The response includes `trace_id`, which is the
        same request trace propagated through logs and persisted PostgreSQL
        RAG trace records. Use `GET /v1/traces/{trace_id}` or
        `oragctl trace --trace-id <trace_id>` to inspect persisted trace
        metadata and node spans.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRequest"
      responses:
        "200":
          description: RAG query response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  "/v1/query:stream":
    post:
      tags: [Query]
      operationId: queryStream
      x-orag-maturity: experimental
      description: |
        Server-Sent Events stream. Events are emitted as `trace`, `chunk`,
        `citations`, `done`, or `error`. The first `trace` event carries the
        request `trace_id`; if the RAG phase fails, the `error` event uses the
        same `trace_id` as JSON error responses and service logs.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRequest"
      responses:
        "200":
          description: SSE query stream.
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          description: SSE error event.
          content:
            text/event-stream:
              schema:
                type: string
  /v1/traces:
    get:
      tags: [Trace]
      operationId: listTraces
      x-orag-maturity: experimental
      description: Lists persisted RAG traces for the current tenant.
      security:
        - bearerAuth: []
      parameters:
        - name: profile
          in: query
          schema:
            $ref: "#/components/schemas/Profile"
        - name: since
          in: query
          schema:
            type: string
            format: date-time
        - name: until
          in: query
          schema:
            type: string
            format: date-time
        - name: has_error
          in: query
          schema:
            type: boolean
        - name: slow_ms
          in: query
          schema:
            type: integer
            format: int64
            minimum: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        "200":
          description: Trace list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraceListResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/traces:stats:
    get:
      tags: [Trace]
      operationId: traceStats
      x-orag-maturity: experimental
      description: Returns node-level latency and error statistics for persisted RAG traces in the current tenant.
      security:
        - bearerAuth: []
      parameters:
        - name: profile
          in: query
          schema:
            $ref: "#/components/schemas/Profile"
        - name: since
          in: query
          schema:
            type: string
            format: date-time
        - name: until
          in: query
          schema:
            type: string
            format: date-time
        - name: has_error
          in: query
          schema:
            type: boolean
        - name: slow_ms
          in: query
          schema:
            type: integer
            format: int64
            minimum: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        "200":
          description: Trace node statistics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraceStatsResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/traces/{trace_id}:
    get:
      tags: [Trace]
      operationId: getTrace
      x-orag-maturity: experimental
      description: Returns a persisted RAG trace and its node spans for the current tenant.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TraceID"
      responses:
        "200":
          description: Trace record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraceRecord"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/api-keys:
    get:
      tags: [APIKeys]
      operationId: listAPIKeys
      x-orag-maturity: experimental
      description: Lists machine credential metadata for the current tenant. Secrets and hashes are never returned.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Tenant API key metadata ordered by newest first.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyListResponse"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
    post:
      tags: [APIKeys]
      operationId: createAPIKey
      x-orag-maturity: experimental
      description: Creates a machine credential. The full secret is returned exactly once in this response.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPIKeyRequest"
      responses:
        "201":
          description: API key metadata and its one-time secret.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAPIKeyResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/api-keys/{api_key_id}:
    parameters:
      - name: api_key_id
        in: path
        required: true
        schema:
          type: string
    delete:
      tags: [APIKeys]
      operationId: revokeAPIKey
      x-orag-maturity: experimental
      description: Idempotently revokes an API key owned by the current tenant.
      security:
        - bearerAuth: []
      responses:
        "204":
          description: API key revoked.
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/projects:
    get:
      tags: [Projects]
      operationId: listProjects
      x-orag-maturity: experimental
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Tenant-scoped projects.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
    post:
      tags: [Projects]
      operationId: createProject
      x-orag-maturity: experimental
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created with default development, staging, and production environments.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/projects/{project_id}:
    parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Projects]
      operationId: getProject
      x-orag-maturity: experimental
      description: Returns `404 project_not_found` when the project does not exist or belongs to another tenant.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
    patch:
      tags: [Projects]
      operationId: updateProject
      x-orag-maturity: experimental
      description: Returns `404 project_not_found` when the project does not exist or belongs to another tenant.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Updated project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/projects/{project_id}/environments:
    parameters:
      - name: project_id
        in: path
        required: true
        schema: {type: string}
    get:
      tags: [Releases]
      operationId: listProjectEnvironments
      x-orag-maturity: experimental
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Ordered development, staging, and production environments.
          content: {application/json: {schema: {$ref: "#/components/schemas/EnvironmentListResponse"}}}
        "401": {$ref: "#/components/responses/Error"}
        "403": {$ref: "#/components/responses/Error"}
        "404": {$ref: "#/components/responses/Error"}
  /v1/projects/{project_id}/releases:
    parameters:
      - name: project_id
        in: path
        required: true
        schema: {type: string}
    get:
      tags: [Releases]
      operationId: listProjectReleases
      x-orag-maturity: experimental
      security: [{bearerAuth: []}]
      responses:
        "200":
          description: Append-only promotion and rollback history.
          content: {application/json: {schema: {$ref: "#/components/schemas/ReleaseListResponse"}}}
        "401": {$ref: "#/components/responses/Error"}
        "403": {$ref: "#/components/responses/Error"}
        "404": {$ref: "#/components/responses/Error"}
  /v1/projects/{project_id}/versions:
    parameters:
      - name: project_id
        in: path
        required: true
        schema: {type: string}
    get:
      tags: [Releases]
      operationId: listProjectPipelineVersions
