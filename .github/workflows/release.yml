name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
      GOFLAGS: -tags=stdjson,gjson
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Verify tag commit is on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: console/package-lock.json
      - run: go mod download
      - run: npm --prefix console ci
      - run: make test vet openapi-validate agent-gate sdk-check
      - run: npm --prefix console test -- --run
      - run: npm --prefix console run build
      - name: Run deterministic Compose walkthrough
        run: make demo
      - name: Repeat walkthrough against the same volumes
        run: docker compose -f deployments/docker-compose.yml --profile demo run --rm --no-deps demo
      - name: Stop Compose stack
        if: always()
        run: make demo-down

  images:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            image: ghcr.io/shikanon/orag-api
            file: deployments/Dockerfile
            target: api
          - name: console
            image: ghcr.io/shikanon/orag-console
            file: deployments/console.Dockerfile
            target: console
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Resolve reproducible build timestamp
        id: buildvars
        run: echo "build_time=$(git show -s --format=%cI "$GITHUB_SHA")" >> "$GITHUB_OUTPUT"
      - name: Build and publish ${{ matrix.name }} image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          sbom: true
          provenance: mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ steps.buildvars.outputs.build_time }}
          tags: |
            ${{ matrix.image }}:${{ github.ref_name }}
            ${{ matrix.image }}:sha-${{ github.sha }}
      - name: Sign immutable image digest
        env:
          IMAGE: ${{ matrix.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE@$DIGEST"
      - name: Record image digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p digests
          echo "$DIGEST" > "digests/${{ matrix.name }}.txt"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-${{ matrix.name }}
          path: digests/${{ matrix.name }}.txt

  github-release:
    needs: images
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digest-*
          merge-multiple: true
          path: digests
      - name: Create prerelease notes
        run: |
          {
            echo "## Container images"
            echo
            echo "- ghcr.io/shikanon/orag-api:${GITHUB_REF_NAME} @ $(cat digests/api.txt)"
            echo "- ghcr.io/shikanon/orag-console:${GITHUB_REF_NAME} @ $(cat digests/console.txt)"
            echo
            echo "Both images support linux/amd64 and linux/arm64 and include registry SBOM/provenance attestations plus keyless signatures."
            echo
            echo "## Quick verification"
            echo
            echo "Run make demo from this tag for the no-key migration, API, Console, ingestion, cited-query, trace, and evaluation walkthrough."
            echo
            echo "Hosted documentation: https://www.tensorbytes.com/orag/ (GitHub Pages mirror: https://shikanon.github.io/orag/)"
            echo
            echo "See CHANGELOG.md and docs/compatibility.md for Beta limitations and migration policy."
          } > release-notes.md
      - name: Create GitHub prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --prerelease --generate-notes --notes-file release-notes.md
