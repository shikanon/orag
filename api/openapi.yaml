openapi: 3.0.3
info:
  title: ORAG API
  version: 0.1.0
  description: Go RAG framework API backed by Hertz, Eino Graph, Ark/Doubao, Qdrant, and PostgreSQL.
servers:
  - url: http://localhost:8080
tags:
  - name: System
  - name: Auth
  - name: KnowledgeBases
  - name: Ingestion
  - name: Query
  - name: Trace
  - name: Evaluation
  - name: OfflineKnowledge
x-orag-agent-capabilities:
  version: 1
  source: openapi
  generation_boundary:
    mcp_tool_schema: true
    skill_manifests: true
    runtime_handlers: false
    note: Ralph Loop is a planned-only agent capability in this manifest; MCP/Skill artifacts can be generated from it, but the ORAG HTTP router intentionally does not register POST /v1/ralph-loop until a real runtime handler is implemented.
  capabilities:
    - id: ralph-loop
      name: Ralph Loop
      description: Run or resume a bounded Ralph Loop verification workflow for an ORAG task/spec and return the verdict, artifacts, and trace identifier.
      status: planned
      source:
        kind: planned_http
        method: POST
        path: /v1/ralph-loop
        operation_id: runRalphLoop
        backing_services:
          - optimization service
          - evaluation service
          - trace service
      auth:
        required: true
        scheme: bearerAuth
        env:
          - ORAG_API_BASE_URL
          - ORAG_API_TOKEN
          - ORAG_TENANT_ID
      trace:
        request_header: X-Trace-ID
        response_header: X-Trace-ID
        response_field: trace_id
      schemas:
        input: "#/components/schemas/RalphLoopRequest"
        output: "#/components/schemas/RalphLoopResponse"
        error: "#/components/schemas/ErrorResponse"
      mcp:
        tool_name: ralph_loop_run
        description: Execute a Ralph Loop task verification workflow through the ORAG API contract.
        input_schema: "#/components/schemas/RalphLoopRequest"
        output_schema: "#/components/schemas/RalphLoopResponse"
      skills:
        manifest_name: ralph-loop
        description: Use when an agent needs to run bounded ORAG Ralph Loop verification from a spec/task path and report a PASS/FAIL verdict with trace evidence.
      examples:
        - name: verify-task1
          input:
            task_spec_path: .trae/specs/add-ralph-loop-mcp-skills/tasks.md
            task_id: Task 1
            mode: focused
            max_rounds: 1
          expected_output:
            status: completed
            verdict: pass
            trace_id: trace_ralph_loop_example
paths:
  /healthz:
    get:
      tags: [System]
      operationId: healthz
      responses:
        "200":
          description: Process is alive.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok
  /readyz:
    get:
      tags: [System]
      operationId: readyz
      responses:
        "200":
          description: Service dependencies are ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: One or more dependencies are not ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
  /metrics:
    get:
      tags: [System]
      operationId: metrics
      responses:
        "200":
          description: Prometheus text metrics.
          content:
            text/plain:
              schema:
                type: string
  /docs:
    get:
      tags: [System]
      operationId: docs
      responses:
        "200":
          description: Minimal API documentation landing page.
          content:
            text/html:
              schema:
                type: string
  /v1/auth/login:
    post:
      tags: [Auth]
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/knowledge-bases:
    get:
      tags: [KnowledgeBases]
      operationId: listKnowledgeBases
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Knowledge base list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeBaseListResponse"
        "401":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
    post:
      tags: [KnowledgeBases]
      operationId: createKnowledgeBase
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKnowledgeBaseRequest"
      responses:
        "201":
          description: Created knowledge base.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeBase"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/knowledge-bases/{id}:
    get:
      tags: [KnowledgeBases]
      operationId: getKnowledgeBase
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Knowledge base.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeBase"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
    delete:
      tags: [KnowledgeBases]
      operationId: deleteKnowledgeBase
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          description: Tenant-scoped knowledge base deleted; directly owned documents, chunks, ingestion jobs, vector points, and semantic-cache entries are removed.
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/knowledge-bases/{id}/documents:
    post:
      tags: [Ingestion]
      operationId: uploadDocument
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "202":
          description: Document ingestion accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "413":
          $ref: "#/components/responses/Error"
  /v1/knowledge-bases/{id}/uploads:
    post:
      tags: [Ingestion]
      operationId: createUploadSession
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUploadRequest"
      responses:
        "201":
          description: Resumable upload session created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadSession"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "413":
          $ref: "#/components/responses/Error"
  /v1/uploads/{id}:
    get:
      tags: [Ingestion]
      operationId: getUploadSession
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Current resumable upload session state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadSession"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    put:
      tags: [Ingestion]
      operationId: appendUploadChunk
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
        - in: header
          name: Upload-Offset
          required: true
          schema:
            type: integer
            minimum: 0
          description: Zero-based byte offset where this chunk must be appended.
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: Chunk accepted and session offset advanced.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadSession"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "413":
          $ref: "#/components/responses/Error"
    delete:
      tags: [Ingestion]
      operationId: cancelUploadSession
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "204":
          description: Upload session canceled and temporary content removed.
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  "/v1/uploads/{id}:complete":
    post:
      tags: [Ingestion]
      operationId: completeUploadSession
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "202":
          description: Upload completed and document ingestion accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteUploadResponse"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  "/v1/knowledge-bases/{id}/documents:import":
    post:
      tags: [Ingestion]
      operationId: importDocument
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportDocumentRequest"
      responses:
        "202":
          description: Document ingestion accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "413":
          $ref: "#/components/responses/Error"
  /v1/ingestion-jobs/{id}:
    get:
      tags: [Ingestion]
      operationId: getIngestionJob
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Ingestion job.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionJob"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/query:
    post:
      tags: [Query]
      operationId: query
      description: |
        Executes a RAG query. The response includes `trace_id`, which is the
        same request trace propagated through logs and persisted PostgreSQL
        RAG trace records. Use `GET /v1/traces/{trace_id}` or
        `oragctl trace --trace-id <trace_id>` to inspect persisted trace
        metadata and node spans.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRequest"
      responses:
        "200":
          description: RAG query response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  "/v1/query:stream":
    post:
      tags: [Query]
      operationId: queryStream
      description: |
        Server-Sent Events stream. Events are emitted as `trace`, `chunk`,
        `citations`, `done`, or `error`. The first `trace` event carries the
        request `trace_id`; if the RAG phase fails, the `error` event uses the
        same `trace_id` as JSON error responses and service logs.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRequest"
      responses:
        "200":
          description: SSE query stream.
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          description: SSE error event.
          content:
            text/event-stream:
              schema:
                type: string
  /v1/traces:
    get:
      tags: [Trace]
      operationId: listTraces
      description: Lists persisted RAG traces for the current tenant.
      security:
        - bearerAuth: []
      parameters:
        - name: profile
          in: query
          schema:
            $ref: "#/components/schemas/Profile"
        - name: since
          in: query
          schema:
            type: string
            format: date-time
        - name: until
          in: query
          schema:
            type: string
            format: date-time
        - name: has_error
          in: query
          schema:
            type: boolean
        - name: slow_ms
          in: query
          schema:
            type: integer
            format: int64
            minimum: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        "200":
          description: Trace list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraceListResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/traces:stats:
    get:
      tags: [Trace]
      operationId: traceStats
      description: Returns node-level latency and error statistics for persisted RAG traces in the current tenant.
      security:
        - bearerAuth: []
      parameters:
        - name: profile
          in: query
          schema:
            $ref: "#/components/schemas/Profile"
        - name: since
          in: query
          schema:
            type: string
            format: date-time
        - name: until
          in: query
          schema:
            type: string
            format: date-time
        - name: has_error
          in: query
          schema:
            type: boolean
        - name: slow_ms
          in: query
          schema:
            type: integer
            format: int64
            minimum: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        "200":
          description: Trace node statistics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraceStatsResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/traces/{trace_id}:
    get:
      tags: [Trace]
      operationId: getTrace
      description: Returns a persisted RAG trace and its node spans for the current tenant.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TraceID"
      responses:
        "200":
          description: Trace record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraceRecord"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/datasets:
    post:
      tags: [Evaluation]
      operationId: createDataset
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDatasetRequest"
      responses:
        "201":
          description: Dataset.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
  /v1/datasets/{id}/items:
    post:
      tags: [Evaluation]
      operationId: addDatasetItem
      description: Returns `404 dataset_not_found` when the dataset does not exist or belongs to another tenant.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDatasetItemRequest"
      responses:
        "201":
          description: Dataset item.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetItem"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/evaluations:
    post:
      tags: [Evaluation]
      operationId: runEvaluation
      description: Returns `404 dataset_not_found` when `dataset_id` does not exist or belongs to another tenant.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunEvaluationRequest"
      responses:
        "202":
          description: Evaluation run result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunEvaluationResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/evaluations/{id}:
    get:
      tags: [Evaluation]
      operationId: getEvaluation
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
        - name: include_items
          in: query
          schema:
            type: boolean
          description: Include per-item evaluation results.
        - name: include_judge
          in: query
          schema:
            type: boolean
          description: Include LLM Judge, QAG and calibration records.
        - name: include_pairwise
          in: query
          schema:
            type: boolean
          description: Include pairwise judge records.
      responses:
        "200":
          description: Evaluation run summary or requested detail envelope.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/RunEvaluationResponse"
                  - $ref: "#/components/schemas/EvaluationDetail"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /v1/optimizations:
    post:
      tags: [Evaluation]
      operationId: optimize
      description: Returns `404 dataset_not_found` when `dataset_id` does not exist or belongs to another tenant.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OptimizeRequest"
      responses:
        "202":
          description: Optimization accepted for asynchronous execution.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimizationAcceptedResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/optimizations/{id}:
    get:
      tags: [Evaluation]
      operationId: getOptimization
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Optimization run status and candidates.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimizationStatusResponse"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  "/v1/optimizations/{id}:cancel":
    post:
      tags: [Evaluation]
      operationId: cancelOptimization
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        description: |
          Optional resume body. It is accepted only for compatible resume/control
          changes. Changes to candidate-defining optimization configuration are
          rejected with `400`.
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OptimizationCancelRequest"
      responses:
        "202":
          description: Cancel request accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimizationAcceptedResponse"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  "/v1/optimizations/{id}:resume":
    post:
      tags: [Evaluation]
      operationId: resumeOptimization
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OptimizeRequest"
      responses:
        "202":
          description: Resume request accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimizationAcceptedResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/offline-knowledge/runs:
    get:
      tags: [OfflineKnowledge]
      operationId: listOfflineKnowledgeRuns
      description: Lists offline knowledge mining runs for the current tenant.
      security:
        - bearerAuth: []
      parameters:
        - name: kb_id
          in: query
          schema:
            type: string
          description: Optional knowledge base filter. `knowledge_base_id` is accepted as a compatibility alias by the runtime.
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/OfflineKnowledgeRunStatus"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Offline knowledge run list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfflineKnowledgeRunListResponse"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
    post:
      tags: [OfflineKnowledge]
      operationId: createOfflineKnowledgeRun
      description: Creates a tenant-scoped offline knowledge mining run for a historical query window.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOfflineKnowledgeRunRequest"
      responses:
        "202":
          description: Offline knowledge run accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfflineKnowledgeRunCreateResponse"
        "200":
          description: Existing matching run returned when the window and config hash already exist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfflineKnowledgeRunCreateResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/offline-knowledge/scheduler:trigger:
    post:
      tags: [OfflineKnowledge]
      operationId: triggerOfflineKnowledgeScheduler
      description: |
        Manually triggers the real offline knowledge scheduler for its configured
        tenant/kb targets. Returns `503` when the scheduler is disabled,
        unconfigured, or a required runtime dependency is unavailable.
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OfflineKnowledgeSchedulerTriggerRequest"
      responses:
        "202":
          description: Scheduler trigger accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfflineKnowledgeSchedulerTriggerResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /v1/offline-knowledge/runs/{id}:
    get:
      tags: [OfflineKnowledge]
      operationId: getOfflineKnowledgeRun
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Offline knowledge run.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfflineKnowledgeRun"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/offline-knowledge/runs/{id}/execute:
    post:
      tags: [OfflineKnowledge]
      operationId: executeOfflineKnowledgeRun
      description: |
        Executes an existing `pending` or `failed` offline knowledge run with
        real history extraction, question clustering, recall replay, Codex
        analysis, evidence validation, and metrics updates. Returns `409` for
        non-executable run statuses and `503` for disabled/unavailable
        dependencies such as Codex, validator, source reader, or retriever.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "202":
          description: Run execution accepted and completed synchronously by the runtime.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfflineKnowledgeRunResult"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/offline-knowledge/runs/{id}/questions:
    get:
      tags: [OfflineKnowledge]
      operationId: listOfflineKnowledgeQuestions
      description: Lists question clusters produced by an offline knowledge run.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
        - name: kb_id
          in: query
          schema:
            type: string
          description: Optional knowledge base filter. `knowledge_base_id` is accepted as a compatibility alias by the runtime.
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Question cluster list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionClusterListResponse"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/optimization-items:
    get:
      tags: [OfflineKnowledge]
      operationId: listOptimizationItems
      description: Lists offline knowledge optimization items for review, shadow enablement, publishing, or revalidation.
      security:
        - bearerAuth: []
      parameters:
        - name: kb_id
          in: query
          schema:
            type: string
          description: Optional knowledge base filter. `knowledge_base_id` is accepted as a compatibility alias by the runtime.
        - name: run_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/OptimizationItemStatus"
        - name: item_type
          in: query
          schema:
            $ref: "#/components/schemas/OptimizationItemType"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Optimization item list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimizationItemListResponse"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/optimization-items/{id}:
    get:
      tags: [OfflineKnowledge]
      operationId: getOptimizationItem
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
      responses:
        "200":
          description: Optimization item.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimizationItem"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/optimization-items/{id}/{action}:
    post:
      tags: [OfflineKnowledge]
      operationId: actOnOptimizationItem
      description: |
        Applies a workflow action to an optimization item. Supported actions are
        `verify`, `reject`, `enable-shadow`, `publish`, `disable`,
        `revalidate`, and `run-regression`. State-transition actions return the
        updated `OptimizationItem`; `revalidate` returns `RevalidateResult`.
        `run-regression` uses the configured real regression dataset id and
        returns `503` when regression is disabled or unavailable.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ID"
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum: [verify, reject, enable-shadow, publish, disable, revalidate, run-regression]
      responses:
        "202":
          description: Action accepted.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/OptimizationItem"
                  - $ref: "#/components/schemas/RevalidateResult"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
  /v1/optimization-items/revalidate:
    post:
      tags: [OfflineKnowledge]
      operationId: bulkRevalidateOptimizationItems
      description: Revalidates stale optimization items that match optional source filters.
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkRevalidateRequest"
      responses:
        "202":
          description: Bulk revalidation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkRevalidateResult"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    Error:
      description: |
        Unified error response. The `trace_id` is always present, is echoed from
        the incoming `X-Trace-ID` header when supplied, and is also returned in
        the `X-Trace-ID` response header for log and persisted trace correlation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string
    TraceID:
      name: trace_id
      in: path
      required: true
      schema:
        type: string
  schemas:
    Profile:
      type: string
      enum: [realtime, high_precision]
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/ErrorBody"
    ErrorBody:
      type: object
      required: [code, message, trace_id]
      properties:
        code:
          type: string
        message:
          type: string
        trace_id:
          type: string
          description: Request trace identifier used for logs and trace lookup.
        details:
          type: object
          additionalProperties: true
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    LoginResponse:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
    ReadinessResponse:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        checks:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ReadinessCheck"
    ReadinessCheck:
      type: object
      required: [status]
      properties:
        status:
          type: string
        error:
          type: string
    CreateKnowledgeBaseRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
    KnowledgeBase:
      type: object
      required: [id, tenant_id, name, description, created_at, updated_at]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        name:
          type: string
        description:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    KnowledgeBaseListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/KnowledgeBase"
    ImportDocumentRequest:
      type: object
      required: [content]
      properties:
        source_uri:
          type: string
        name:
          type: string
        content:
          type: string
    CreateUploadRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        source_uri:
          type: string
        total_bytes:
          type: integer
          format: int64
          minimum: 0
          description: Optional declared full object size. Completion requires received_bytes to match when provided.
    UploadSession:
      type: object
      required: [id, tenant_id, knowledge_base_id, name, source_uri, total_bytes, received_bytes, status, created_at, updated_at, upload_url, complete_url]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        knowledge_base_id:
          type: string
        name:
          type: string
        source_uri:
          type: string
        total_bytes:
          type: integer
          format: int64
        received_bytes:
          type: integer
          format: int64
        status:
          type: string
          enum: [uploading, completed, canceled]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        upload_url:
          type: string
          example: /v1/uploads/upl_xxx
        complete_url:
          type: string
          example: /v1/uploads/upl_xxx:complete
    CompleteUploadResponse:
      type: object
      required: [upload, document, chunks, job]
      properties:
        upload:
          $ref: "#/components/schemas/UploadSession"
        document:
          $ref: "#/components/schemas/Document"
        chunks:
          type: integer
        job:
          $ref: "#/components/schemas/IngestionJob"
    IngestionResponse:
      type: object
      required: [document, chunks, job]
      properties:
        document:
          $ref: "#/components/schemas/Document"
        chunks:
          type: integer
        job:
          $ref: "#/components/schemas/IngestionJob"
    IngestionJob:
      type: object
      required: [id, tenant_id, knowledge_base_id, status, source_uri, chunk_count, created_at, updated_at]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        knowledge_base_id:
          type: string
        status:
          type: string
          enum: [running, succeeded, failed]
        source_uri:
          type: string
        document_id:
          type: string
        chunk_count:
          type: integer
        error:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Document:
      type: object
      required: [id, tenant_id, knowledge_base_id, source_uri, title, content_hash, created_at]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        knowledge_base_id:
          type: string
        source_uri:
          type: string
        title:
          type: string
        content_hash:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
        created_at:
          type: string
          format: date-time
    Chunk:
      type: object
      required: [id, tenant_id, knowledge_base_id, document_id, content, source_uri]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        knowledge_base_id:
          type: string
        document_id:
          type: string
        content:
          type: string
        source_uri:
          type: string
        page:
          type: integer
        section:
          type: string
        offset:
          type: integer
        metadata:
          type: object
          additionalProperties:
            type: string
    SearchResult:
      type: object
      required: [chunk, score, rank, from]
      properties:
        chunk:
          $ref: "#/components/schemas/Chunk"
        score:
          type: number
          format: double
        rank:
          type: integer
        from:
          type: string
    Citation:
      type: object
      required: [chunk_id, document_id, source_uri]
      properties:
        chunk_id:
          type: string
        document_id:
          type: string
        source_uri:
          type: string
        section:
          type: string
        quote:
          type: string
    QueryRequest:
      type: object
      required: [knowledge_base_id, query]
      properties:
        knowledge_base_id:
          type: string
        query:
          type: string
        profile:
          $ref: "#/components/schemas/Profile"
        session_id:
          type: string
        top_k:
          type: integer
          minimum: 1
          maximum: 100
          description: Number of final fused/reranked retrieved_chunks to return. When omitted, the service top-k is used, defaulting from RAG_DENSE_TOP_K; RAG_CONTEXT_TOP_N only limits prompt context and citations.
    QueryResponse:
      type: object
      required: [answer, citations, retrieved_chunks, trace_id, cache_status, profile, latency_ms, created_at]
      properties:
        answer:
          type: string
        citations:
          type: array
          items:
            $ref: "#/components/schemas/Citation"
        retrieved_chunks:
          type: array
          description: Final fused/reranked retrieval results sized by top_k. Prompt context and citations may include fewer chunks because they are independently limited by RAG_CONTEXT_TOP_N and token budget.
          items:
            $ref: "#/components/schemas/SearchResult"
        trace_id:
          type: string
          description: Request trace identifier. Query traces can be inspected with `oragctl trace --trace-id <trace_id>`.
        cache_status:
          type: string
          description: Semantic cache state. `bypass` is returned when the query router sends a request through the direct route without retrieval or cache lookup.
          enum: [hit, miss, error, bypass]
        profile:
          $ref: "#/components/schemas/Profile"
        warnings:
          type: array
          items:
            type: string
        latency_ms:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
    TraceListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/TraceRecord"
    TraceStatsResponse:
      type: object
      required: [tenant_id, items]
      properties:
        tenant_id:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/TraceNodeStat"
    TraceNodeStat:
      type: object
      required: [node_name, count, avg_latency_ms, p95_latency_ms, p99_latency_ms, error_count]
      properties:
        node_name:
          type: string
        count:
          type: integer
          format: int64
        avg_latency_ms:
          type: number
          format: double
        p95_latency_ms:
          type: number
          format: double
        p99_latency_ms:
          type: number
          format: double
        error_count:
          type: integer
          format: int64
    TraceRecord:
      type: object
      required: [trace_id, tenant_id, profile, latency_ms, created_at, has_error, error_count, node_spans]
      properties:
        trace_id:
          type: string
        tenant_id:
          type: string
        profile:
          $ref: "#/components/schemas/Profile"
        latency_ms:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        has_error:
          type: boolean
        error_count:
          type: integer
        node_spans:
          type: array
          items:
            $ref: "#/components/schemas/TraceNodeSpan"
    TraceNodeSpan:
      type: object
      required: [id, node_name, sequence, latency_ms, started_at, ended_at, created_at]
      properties:
        id:
          type: string
        node_name:
          type: string
        sequence:
          type: integer
        latency_ms:
          type: integer
          format: int64
        error:
          type: string
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    CreateDatasetRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        kind:
          type: string
          default: golden
    Dataset:
      type: object
      required: [id, tenant_id, name, kind, version, created_at]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        name:
          type: string
        kind:
          type: string
        version:
          type: string
        created_at:
          type: string
          format: date-time
    CreateDatasetItemRequest:
      type: object
      required: [query, ground_truth]
      properties:
        query:
          type: string
        ground_truth:
          type: string
        relevant_doc_ids:
          type: array
          items:
            type: string
        diversity_annotations:
          type: array
          items:
            type: object
            additionalProperties: true
    DatasetItem:
      type: object
      required: [id, dataset_id, query, ground_truth, relevant_doc_ids]
      properties:
        id:
          type: string
        dataset_id:
          type: string
        query:
          type: string
        ground_truth:
          type: string
        relevant_doc_ids:
          type: array
          items:
            type: string
        diversity_annotations:
          type: array
          items:
            type: object
            additionalProperties: true
    RunEvaluationRequest:
      type: object
      required: [dataset_id, knowledge_base_id]
      properties:
        dataset_id:
          type: string
        knowledge_base_id:
          type: string
        profile:
          $ref: "#/components/schemas/Profile"
        top_k:
          type: integer
        judge:
          $ref: "#/components/schemas/JudgeConfig"
        qag:
          $ref: "#/components/schemas/JudgeConfig"
    RunEvaluationResponse:
      type: object
      required: [id, dataset_id, profile, total, hit_rate, accuracy, created_at]
      description: |
        Evaluation run summary. `accuracy` and `hit_rate` are answer-focused
        compatibility fields equal to `metrics.answer_accuracy` for new runs.
        `metrics.pairwise_accuracy` is the primary optimization quality metric;
        current rule-based runs populate it from the same answer-focused signal
        until pairwise judging is enabled.
      example:
        id: eval_xxx
        dataset_id: ds_xxx
        profile: realtime
        total: 1
        hit_rate: 1
        accuracy: 1
        metrics:
          answer_accuracy: 1
          accuracy: 1
          hit_rate: 1
          pairwise_accuracy: 1
          citation_hit_rate: 1
          context_recall: 1
          citation_precision: 1
          ndcg_at_k: 1
          recall_at_k: 1
          mrr: 1
          map: 1
          coverage: 1
          retrieval_failure_rate: 0
          redundancy_rate: 0
          duplicate_count: 0
          deduped_top_k_count: 1
          alpha_ndcg: 1
          aspect_coverage: 1
          latency_p95_ms: 42
          cache_hit_rate: 0
        created_at: "2026-06-29T10:04:00Z"
      properties:
        id:
          type: string
        dataset_id:
          type: string
        profile:
          type: string
        total:
          type: integer
        hit_rate:
          type: number
          format: double
          description: Answer-focused hit rate. New runs keep this equal to `answer_accuracy`.
        accuracy:
          type: number
          format: double
          description: Answer-focused compatibility alias for `answer_accuracy`.
        metrics:
          $ref: "#/components/schemas/EvaluationMetrics"
        created_at:
          type: string
          format: date-time
    EvaluationMetrics:
      type: object
      description: |
        Aggregated evaluation metrics. Retrieval quality metrics are averaged
        across dataset items; `latency_p95_ms` is the run-level P95 latency.
        `pairwise_accuracy` is the primary quality metric for optimization
        ranking semantics.
      additionalProperties:
        type: number
        format: double
      properties:
        answer_accuracy:
          type: number
          format: double
          description: Answer-focused deterministic rule score; citations do not increase this metric.
        accuracy:
          type: number
          format: double
          description: Deterministic rule-based hit rate for backward compatibility.
        hit_rate:
          type: number
          format: double
          description: Alias for deterministic rule-based accuracy.
        pairwise_accuracy:
          type: number
          format: double
          description: Primary optimization quality metric; currently populated from answer_accuracy when pairwise judging is unavailable.
        citation_hit_rate:
          type: number
          format: double
          description: Fraction of items where the response includes at least one citation; does not imply answer correctness.
        context_recall:
          type: number
          format: double
          description: Fraction of expected relevant documents observed in retrieved context.
        citation_precision:
          type: number
          format: double
          description: Fraction of citations that point to expected relevant documents.
        ndcg_at_k:
          type: number
          format: double
          description: Ranking quality normalized discounted cumulative gain at requested top_k.
        recall_at_k:
          type: number
          format: double
          description: Fraction of relevant documents retrieved within requested top_k.
        mrr:
          type: number
          format: double
          description: Mean reciprocal rank of the first relevant retrieved document.
        map:
          type: number
          format: double
          description: Mean average precision over relevant retrieved documents.
        coverage:
          type: number
          format: double
          description: Fraction of items with at least one relevant retrieved document.
        retrieval_failure_rate:
          type: number
          format: double
          description: Fraction of items with no relevant retrieved documents.
        redundancy_rate:
          type: number
          format: double
          description: Duplicate retrieved chunk ratio.
        duplicate_count:
          type: number
          format: double
          description: Average duplicate retrieved chunk count.
        deduped_top_k_count:
          type: number
          format: double
          description: Average non-duplicate retrieved chunk count.
        alpha_ndcg:
          type: number
          format: double
          description: Diversity-aware ranking quality when aspect annotations are available.
        aspect_coverage:
          type: number
          format: double
          description: Fraction of annotated aspects covered by retrieved context.
        latency_p95_ms:
          type: number
          format: double
          description: P95 end-to-end query latency in milliseconds.
        cache_hit_rate:
          type: number
          format: double
          description: Fraction of evaluation queries served from semantic cache.
    JudgeMetric:
      type: string
      enum:
        - faithfulness
        - groundedness
        - answer_relevance
        - hallucination
        - completeness
        - citation_support
        - instruction_following
        - safety
    JudgeConfig:
      type: object
      description: Optional LLM-as-Judge or QAG configuration. When supplied, the evaluation runner records raw/parsed judge outputs, token usage and cost.
      properties:
        provider:
          type: string
        model:
          type: string
        prompt_version:
          type: string
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/JudgeMetric"
        rubric:
          $ref: "#/components/schemas/JudgeRubric"
        temperature:
          type: number
          format: double
        max_tokens:
          type: integer
        repeat:
          type: integer
