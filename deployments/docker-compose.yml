services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orag
      POSTGRES_PASSWORD: orag
      POSTGRES_DB: orag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orag -d orag"]
      interval: 5s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.11.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:6333/readyz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20

  orag-api:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgres://orag:orag@postgres:5432/orag?sslmode=disable}
      QDRANT_HOST: ${DOCKER_QDRANT_HOST:-qdrant}
      QDRANT_GRPC_PORT: ${DOCKER_QDRANT_GRPC_PORT:-6334}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
