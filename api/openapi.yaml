    OptimizationItemStatus:
      type: string
      enum: [candidate, evidence_validating, needs_review, verified, shadow_enabled, regression_passed, regression_failed, published, knowledge_gap, rejected, stale, deprecated]
    OptimizationItemType:
      type: string
      enum: [answer_item, query_rewrite_item, knowledge_gap_item]
    RecallQuality:
      type: string
      enum: [hit, partial_hit, miss, bad_answer, no_answer_in_kb, ambiguous, duplicate]
    FailureType:
      type: string
      enum: [keyword_mismatch, semantic_gap, chunk_boundary, rerank_error, graph_missing, generation_error, knowledge_gap, unclear_question]
    OfflineKnowledgeRun:
      type: object
      required: [id, tenant_id, kb_id, status, window_start, window_end, config_hash, started_at]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        kb_id:
          type: string
        status:
          $ref: "#/components/schemas/OfflineKnowledgeRunStatus"
        window_start:
          type: string
          format: date-time
        window_end:
          type: string
          format: date-time
        config_hash:
          type: string
        config_json:
          type: object
          additionalProperties: true
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        error:
          type: string
    QuestionCluster:
      type: object
      required: [id, tenant_id, run_id, kb_id, canonical_question, normalized_question, question_hash, occurrence_count, sample_questions, trace_ids, created_at]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        run_id:
          type: string
        kb_id:
          type: string
        canonical_question:
          type: string
        normalized_question:
          type: string
        question_hash:
          type: string
        embedding_ref:
          type: string
        embedding_json:
          type: array
          items:
            type: number
            format: double
        occurrence_count:
          type: integer
        sample_questions:
          type: array
          items:
            type: string
        trace_ids:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
    OptimizationItem:
      type: object
      required: [id, tenant_id, run_id, kb_id, question_cluster_id, item_type, status, canonical_question, recall_quality, confidence, source_fingerprints, evidence, deep_search_steps, created_at, updated_at]
      description: |
        Offline knowledge recommendation item. `answer_item` values are recall
        guidance only: shadow retrieval may surface source fingerprints and
        evidence metadata, but the runtime must still ground answers in recalled
        chunks rather than injecting `final_answer` as a direct response.
      properties:
        id:
          type: string
        tenant_id:
          type: string
        run_id:
          type: string
        kb_id:
          type: string
        question_cluster_id:
          type: string
        item_type:
          $ref: "#/components/schemas/OptimizationItemType"
        status:
          $ref: "#/components/schemas/OptimizationItemStatus"
        canonical_question:
          type: string
        final_answer:
          type: string
          description: Candidate answer text retained for review and evidence validation; not a direct answer-injection payload.
        recall_quality:
          $ref: "#/components/schemas/RecallQuality"
        failure_type:
          $ref: "#/components/schemas/FailureType"
        confidence:
          type: number
          format: double
        source_fingerprints:
          type: array
          description: Source identity uses `doc_version` and `chunk_content_hash` to detect stale or mutated evidence.
          items:
            $ref: "#/components/schemas/SourceFingerprint"
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/Evidence"
        deep_search_steps:
          type: array
          items:
            $ref: "#/components/schemas/DeepSearchStep"
        eval_report_json:
          $ref: "#/components/schemas/EvalReport"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        published_at:
          type: string
          format: date-time
    SourceFingerprint:
      type: object
      required: [doc_id, doc_version, chunk_id, chunk_content_hash]
      description: Stable source fingerprint. Validation compares both `doc_version` and `chunk_content_hash`; doc ID alone is not sufficient.
      properties:
        doc_id:
          type: string
        doc_version:
          type: string
        chunk_id:
          type: string
        chunk_content_hash:
          type: string
          example: sha256:abc123
    Evidence:
      type: object
      required: [chunk_id, doc_id, quote, supports]
      properties:
        chunk_id:
          type: string
        doc_id:
          type: string
        quote:
          type: string
          description: Exact text that must be contained in the current source chunk.
        supports:
          type: string
          description: Claim or answer fragment supported by this quote.
    DeepSearchStep:
      type: object
      required: [step, tool, query, observation, decision]
      properties:
        step:
          type: integer
        tool:
          type: string
        query:
          type: string
        observation:
          type: string
        decision:
          type: string
    EvalReport:
      type: object
      required: [result, thresholds, passed, full_dataset_required, full_dataset_used, evaluated_at]
      properties:
        result:
          $ref: "#/components/schemas/RegressionResult"
        thresholds:
          $ref: "#/components/schemas/RegressionThresholds"
        passed:
          type: boolean
        reasons:
          type: array
          items:
            type: string
        full_dataset_required:
          type: boolean
        full_dataset_used:
          type: boolean
        evaluated_at:
          type: string
          format: date-time
    RegressionResult:
      type: object
      required: [recall_lift, answer_quality_lift, citation_coverage_lift, latency_delta_ms, token_cost_delta, hallucination_risk, full_dataset_used, passed]
      properties:
        recall_lift:
          type: number
          format: double
        answer_quality_lift:
          type: number
          format: double
        citation_coverage_lift:
          type: number
          format: double
        latency_delta_ms:
          type: integer
          format: int64
          description: Latency delta between with-optimization and baseline runs in milliseconds.
        token_cost_delta:
          type: number
          format: double
        hallucination_risk:
          type: number
          format: double
        full_dataset_used:
          type: boolean
        passed:
          type: boolean
    RegressionThresholds:
      type: object
      properties:
        min_recall_lift:
          type: number
          format: double
        min_answer_quality_lift:
          type: number
          format: double
        min_citation_coverage_lift:
          type: number
          format: double
        max_latency_delta:
          type: integer
          format: int64
          description: Go duration encoded as nanoseconds in JSON.
        max_token_cost_delta:
          type: number
          format: double
        max_hallucination_risk:
          type: number
          format: double
    BulkRevalidateRequest:
      type: object
      properties:
        knowledge_base_id:
          type: string
          description: Optional compatibility alias for `kb_id`.
        kb_id:
          type: string
        status:
          $ref: "#/components/schemas/OptimizationItemStatus"
        source_fingerprint:
          $ref: "#/components/schemas/SourceFingerprint"
        source_doc_id:
          type: string
        source_chunk_id:
          type: string
        source_content_hash:
          type: string
          description: Filters by `source_fingerprints[].chunk_content_hash`.
        limit:
          type: integer
          minimum: 1
    RevalidateResult:
      type: object
      required: [item, updated, skipped, old_status, new_status]
      properties:
        item:
          $ref: "#/components/schemas/OptimizationItem"
        updated:
          type: boolean
        skipped:
          type: boolean
        old_status:
          $ref: "#/components/schemas/OptimizationItemStatus"
        new_status:
          $ref: "#/components/schemas/OptimizationItemStatus"
        error:
          type: string
          nullable: true
    BulkRevalidateResult:
      type: object
      required: [matched, updated, skipped, results]
      properties:
        matched:
          type: integer
        updated:
          type: integer
        skipped:
          type: integer
        results:
          type: array
          items:
            $ref: "#/components/schemas/RevalidateResult"
    ShadowMatch:
      type: object
      required: [item_id, item_type, source, score, rank]
      description: Shadow retrieval match. By default this is non-invasive guidance; injection requires explicit runtime configuration.
      properties:
        item_id:
          type: string
        item_type:
          $ref: "#/components/schemas/OptimizationItemType"
        source:
          type: string
          enum: [optimization_library]
        score:
          type: number
          format: double
        rank:
          type: integer
        answer_item:
          $ref: "#/components/schemas/ShadowAnswerItem"
        metadata:
          type: object
          additionalProperties: true
    ShadowAnswerItem:
      type: object
      required: [source_fingerprints, evidence]
      description: Recall guidance metadata for an `answer_item`; it is not a direct generated answer.
      properties:
        source_fingerprints:
          type: array
          items:
            $ref: "#/components/schemas/SourceFingerprint"
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/Evidence"
        guidance_metadata:
          type: object
          additionalProperties: true
    ShadowRetrievalEvent:
      type: object
      required: [id, tenant_id, kb_id, item_id, trace_id, query, matched, injected, created_at]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        kb_id:
          type: string
        item_id:
          type: string
        trace_id:
          type: string
        query:
          type: string
        matched:
          type: boolean
        injected:
          type: boolean
          description: False for default non-invasive shadow mode.
        rank:
          type: integer
        score:
          type: number
          format: double
        recall_lift:
          type: number
          format: double
        answer_lift:
          type: number
          format: double
        hallucination_risk:
          type: number
          format: double
        created_at:
          type: string
          format: date-time
    RalphLoopRequest:
      type: object
      required: [task_spec_path, task_id, mode, max_rounds]
      description: |
        Input contract for the Ralph Loop agent capability. The Task 1
        capability manifest marks the runtime endpoint as planned; MCP tools
        and Skill manifests use this schema as their input source of truth.
      properties:
        task_spec_path:
          type: string
          description: Repository-relative path to the spec tasks file or task directory.
          example: .trae/specs/add-ralph-loop-mcp-skills/tasks.md
        task_id:
          type: string
          description: Task label to verify, for example `Task 1`.
          example: Task 1
        mode:
          type: string
          enum: [focused, broad]
          description: Focused verifies the requested task only; broad verifies dependent surfaces too.
          example: focused
        max_rounds:
          type: integer
          minimum: 1
          maximum: 20
          description: Maximum Ralph Loop verification rounds allowed for this invocation.
          example: 1
        base_ref:
          type: string
          description: Optional git base ref used for diff-aware verification.
          example: origin/main
        notes:
          type: string
          description: Optional operator instructions that must not override the task boundary.
    RalphLoopResponse:
      type: object
      required: [run_id, status, verdict, summary, trace_id, artifacts]
      description: Ralph Loop result envelope returned to MCP clients and generated Skills.
      properties:
        run_id:
          type: string
          example: ralph_loop_20260705_task1
        status:
          type: string
          enum: [queued, running, completed, failed]
          example: completed
        verdict:
          type: string
          enum: [pass, fail, blocked]
          example: pass
        summary:
          type: string
          description: Human-readable verification summary.
        trace_id:
          type: string
          description: Request trace identifier correlated with logs and trace lookup.
          example: trace_ralph_loop_example
        artifacts:
          type: array
          description: Files or commands that provide evidence for the verdict.
          items:
            $ref: "#/components/schemas/RalphLoopArtifact"
        error:
          $ref: "#/components/schemas/ErrorBody"
    RalphLoopArtifact:
      type: object
      required: [kind, name]
      properties:
        kind:
          type: string
          enum: [file, command, trace]
        name:
          type: string
        uri:
          type: string
        content_type:
          type: string
        sha256:
          type: string
    OptimizeRequest:
      type: object
      required: [dataset_id, knowledge_base_id]
      description: |
        Asynchronous target-driven optimizer request. `profiles` and `top_ks`
        are accepted as a backward-compatible shortcut and are mapped into an
        internal RAG runner profile and retrieval top-k search space.
      properties:
        dataset_id:
          type: string
        knowledge_base_id:
          type: string
        objective:
          $ref: "#/components/schemas/ObjectiveSpec"
        search_space:
          $ref: "#/components/schemas/SearchSpace"
        search:
          $ref: "#/components/schemas/SearchSpec"
        budget:
          $ref: "#/components/schemas/OptimizerBudget"
        profile:
          $ref: "#/components/schemas/Profile"
        top_k:
          type: integer
        namespace_ttl_seconds:
          type: integer
        selection_split:
          type: string
          example: eval
        holdout_split:
          type: string
          example: holdout
        runner:
          type: object
          additionalProperties: true
        profiles:
          type: array
          items:
            $ref: "#/components/schemas/Profile"
        top_ks:
          type: array
          items:
            type: integer
    ObjectiveSpec:
      type: object
      properties:
        maximize:
          type: string
          example: pairwise_accuracy
        constraints:
          type: array
          items:
            $ref: "#/components/schemas/ObjectiveConstraint"
        tie_breakers:
          type: array
          items:
            $ref: "#/components/schemas/ObjectiveTieBreaker"
        budget:
          $ref: "#/components/schemas/ObjectiveBudget"
        baseline_id:
          type: string
        bootstrap_iterations:
          type: integer
        significance_alpha:
          type: number
          format: double
    ObjectiveConstraint:
      type: object
      required: [expression]
      properties:
        expression:
          type: string
          example: latency_p95_ms <= 1000
    ObjectiveTieBreaker:
      type: object
      required: [metric]
      properties:
        metric:
          type: string
          example: latency_p95_ms
        direction:
          type: string
          enum: [asc, desc]
    ObjectiveBudget:
      type: object
      properties:
        latency_p95_limit_ms:
          type: number
          format: double
        cost_limit_usd:
          type: number
          format: double
    OptimizerBudget:
      type: object
      properties:
        max_judge_calls:
          type: integer
        max_cost_usd:
          type: number
          format: double
        max_wall_time_seconds:
          type: integer
    SearchSpec:
      type: object
      properties:
        strategy:
          type: string
          enum: [grid, seeded_random, successive_halving]
        max_candidates:
          type: integer
        seed:
          type: integer
          format: int64
        large_space_warning_threshold:
          type: integer
          format: int64
    SearchSpace:
      type: object
      properties:
        prompts:
          type: array
          items:
            type: object
            additionalProperties: true
        chunking:
          type: object
          additionalProperties: true
        embedding:
          type: object
          additionalProperties: true
        reranker:
          type: object
          additionalProperties: true
        retrieval:
          $ref: "#/components/schemas/RetrievalSearchSpace"
        graph:
          type: object
          additionalProperties: true
        harness:
          type: array
          items:
            $ref: "#/components/schemas/HarnessCandidate"
    RetrievalSearchSpace:
      type: object
      properties:
        dense_top_k:
          type: array
          items:
            type: integer
        sparse_top_k:
          type: array
          items:
            type: integer
        rrf_k:
          type: array
          items:
            type: integer
        semantic_cache_thresholds:
          type: array
          items:
            type: number
            format: double
    HarnessCandidate:
      type: object
      description: External harness config. Use argv array only; shell command strings and `${VAR}` interpolation are rejected.
      properties:
        kind:
          type: string
        argv:
          type: array
          items:
            type: string
        command:
          type: string
          deprecated: true
    CandidateResult:
      type: object
      required: [profile, top_k, score, pairwise_accuracy, run_id]
      description: |
        Optimization candidate summary. `score` is the primary ranking score and
        has pairwise accuracy semantics; retrieval quality fields are diagnostic
        metrics copied from the candidate evaluation run.
      properties:
        profile:
          $ref: "#/components/schemas/Profile"
        top_k:
          type: integer
        score:
          type: number
          format: double
          description: Primary ranking score; equivalent to pairwise_accuracy semantics and currently populated from answer_accuracy.
        pairwise_accuracy:
          type: number
          format: double
          description: Primary optimization quality metric.
        ndcg_at_k:
          type: number
          format: double
        recall_at_k:
          type: number
          format: double
        mrr:
          type: number
          format: double
        map:
          type: number
          format: double
        retrieval_failure_rate:
          type: number
          format: double
        redundancy_rate:
          type: number
          format: double
        duplicate_count:
          type: number
          format: double
        deduped_top_k_count:
          type: number
          format: double
        alpha_ndcg:
          type: number
          format: double
        aspect_coverage:
          type: number
          format: double
        latency_p95_ms:
          type: number
          format: double
        run_id:
