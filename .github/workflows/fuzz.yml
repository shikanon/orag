name: fuzz

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "43 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native:
    name: native (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: parser
            package: ./internal/ingest/parser
            function: FuzzBasicParser
          - target: expression
            package: ./internal/optimizer
            function: FuzzCompileExpression
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.5"
          cache: true
      - name: Run native Go fuzz target
        env:
          CGO_ENABLED: "0"
          GOFLAGS: -tags=stdjson,gjson
          FUZZ_TIME: ${{ github.event_name == 'schedule' && '5m' || '20s' }}
        run: go test ${{ matrix.package }} -run='^$' -fuzz='^${{ matrix.function }}$' -fuzztime="$FUZZ_TIME"
      - name: Upload crashing inputs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: ${{ matrix.package }}/testdata/fuzz/${{ matrix.function }}/
          if-no-files-found: ignore
          retention-days: 14
