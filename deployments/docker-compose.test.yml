services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orag
      POSTGRES_PASSWORD: orag
      POSTGRES_DB: orag_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orag -d orag_test"]
      interval: 5s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.11.5
    ports:
      - "6633:6333"
      - "6634:6334"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': </dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 3s
      retries: 20
