          $ref: "#/components/schemas/SearchSpec"
        budget:
          $ref: "#/components/schemas/OptimizerBudget"
        profile:
          $ref: "#/components/schemas/Profile"
        top_k:
          type: integer
        namespace_ttl_seconds:
          type: integer
        selection_split:
          type: string
          example: eval
        holdout_split:
          type: string
          example: holdout
        runner:
          type: object
          additionalProperties: true
        profiles:
          type: array
